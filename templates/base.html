<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StockScope{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom border-secondary px-4">
        <a class="navbar-brand fw-bold fs-5 me-4" href="/">
            <span class="text-success">Stock</span>Scope
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <input class="form-control form-control-sm bg-dark border-secondary text-light"
                   type="search" id="navbar-search"
                   placeholder="Ticker (ex: PETR4.SA)" style="max-width:220px">
            <button class="btn btn-sm btn-success" id="navbar-search-btn">Buscar</button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
